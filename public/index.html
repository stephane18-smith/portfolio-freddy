<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MD-Shop - Prêt-à-Porter & Accessoires</title>
  <meta name="description" content="Découvrez notre collection exclusive de vêtements, chaussures et accessoires de mode. Tendance, qualité et élégance pour hommes et femmes.">
  <meta name="keywords" content="vêtements, chaussures, accessoires, mode, prêt-à-porter, style, élégance">
  <meta name="author" content="MD-Shop">
  <meta property="og:title" content="MD-Shop - Vêtements, Chaussures & Accessoires">
  <meta property="og:description" content="Collection exclusive de mode pour hommes et femmes. Découvrez nos dernières tendances.">
  <meta property="og:type" content="website">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="/images/logo.png" />
  
  <!-- iOS Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MD-Shop" />
  
  <!-- Theme Color -->
  <meta name="theme-color" content="#E67E22" />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- Splash Screen Styles -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a2a4f 0%, #E67E22 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    
    .splash-content {
      text-align: center;
      animation: fadeInUp 0.6s ease-out;
      padding: 1rem;
    }
    
    .splash-logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 1.5rem;
      animation: pulse 1.5s infinite;
      filter: drop-shadow(0 4px 15px rgba(0, 0, 0, 0.2));
    }
    
    .splash-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFD700, #E67E22);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    
    .splash-subtitle {
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      color: #F5E6D3;
      opacity: 0.9;
    }
    
    .splash-loader {
      width: 40px;
      height: 40px;
      margin: 2rem auto 0;
      border: 3px solid rgba(255, 215, 0, 0.3);
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    
    .splash-screen.hide {
      opacity: 0;
      visibility: hidden;
    }
    
    /* Desktop */
    @media (min-width: 769px) {
      .splash-logo {
        width: 150px;
        height: 150px;
      }
      
      .splash-title {
        font-size: 2.5rem;
      }
      
      .splash-subtitle {
        font-size: 1rem;
      }
    }
    
    /* Mobile */
    @media (max-width: 768px) {
      .splash-logo {
        width: 100px;
        height: 100px;
      }
      
      .splash-title {
        font-size: 1.8rem;
      }
      
      .splash-subtitle {
        font-size: 0.75rem;
      }
      
      .splash-loader {
        width: 35px;
        height: 35px;
      }
    }
    
    /* Très petits mobiles */
    @media (max-width: 480px) {
      .splash-logo {
        width: 80px;
        height: 80px;
      }
      
      .splash-title {
        font-size: 1.5rem;
      }
      
      .splash-subtitle {
        font-size: 0.7rem;
      }
      
      .splash-loader {
        width: 30px;
        height: 30px;
      }
    }
  </style>
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash-screen" class="splash-screen">
    <div class="splash-content">
      <img src="/images/logo.png" alt="MD-Shop" class="splash-logo" />
      <h1 class="splash-title">MD-Shop</h1>
      <p class="splash-subtitle">le style qui vous définit</p>
      <div class="splash-loader"></div>
    </div>
  </div>
  
  <div id="root"></div>
  
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var splash = document.getElementById('splash-screen');
        if (splash) {
          splash.classList.add('hide');
          setTimeout(function() {
            splash.style.display = 'none';
          }, 500);
        }
      }, 1500);
    });
  </script>
</body>
</html>
